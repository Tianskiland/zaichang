<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;color:#3a3228;background:linear-gradient(165deg,#F7F3EE 0%,#EDE8E0 50%,#E8E0D6 100%);background-attachment:fixed;min-height:100vh}
#app{max-width:520px;margin:0 auto;padding-bottom:120px}
textarea,input{font-family:inherit}
textarea::placeholder,input::placeholder{color:#c0b8ae}
textarea:focus,input:focus{outline:none}
button{font-family:inherit;cursor:pointer}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateY(10px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.fade{animation:fadeIn .3s ease}
.hdr{padding:32px 24px 6px;display:flex;align-items:flex-start;justify-content:space-between}
.hdr h1{font-family:'Noto Serif SC',serif;font-size:32px;font-weight:700;letter-spacing:8px;margin-bottom:4px}
.hdr p{font-size:13px;color:#a09888;letter-spacing:2px;font-weight:300}
.searchbtn{background:rgba(255,252,248,.7);border:1px solid rgba(120,100,80,.12);border-radius:10px;width:42px;height:42px;font-size:18px;color:#8a8078;display:flex;align-items:center;justify-content:center;margin-top:4px}
.quote{margin:12px 24px 4px;padding:15px 18px;border-radius:12px;background:rgba(255,252,248,.78);border:1px solid rgba(120,100,80,.10);border-left:3px solid #D4764E}
.quote .s{font-family:'Noto Serif SC',serif;font-size:16px;line-height:1.85;color:#4a4035}
.quote .meta{display:flex;align-items:center;justify-content:space-between;margin-top:9px}
.quote .sc{font-size:13px;color:#B07A4E}
.quote .refresh{font-size:13px;color:#b0a898;background:none;border:none}
.tabs{display:flex;padding:0 24px;margin:12px 0 16px;border-bottom:1px solid rgba(120,100,80,.08)}
.tab{background:none;border:none;padding:9px 16px;font-size:15px;color:#a09888;border-bottom:2px solid transparent;letter-spacing:2px;transition:all .2s}
.tab.on{color:#3a3228;font-weight:600;border-bottom-color:#3a3228}
.body{padding:0 24px}
.dline{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.dline .d{font-family:'Noto Serif SC',serif;font-size:20px;font-weight:600;letter-spacing:2px}
.dline .today{font-size:13px;color:#D4764E;font-weight:500;margin-top:2px}
.backbtn{background:none;border:1px solid rgba(120,100,80,.15);border-radius:8px;padding:5px 12px;font-size:13px;color:#8a8078}
.grpttl{font-size:13px;color:#9a9088;letter-spacing:2px;margin:6px 0 10px;display:flex;align-items:center;gap:8px}
.grpttl::after{content:"";flex:1;height:1px;background:rgba(120,100,80,.10)}
.cat{margin-bottom:12px;border-left:3px solid;padding-left:14px}
.catbar{display:flex;align-items:center;justify-content:space-between;padding:10px 0}
.catbar .left{display:flex;align-items:center;gap:7px;font-family:'Noto Serif SC',serif}
.catbar .ico{font-size:16px;font-weight:600}.catbar .lbl{font-size:16px;font-weight:600;letter-spacing:2px}
.catbar .tag{font-size:11px;padding:1px 7px;border-radius:8px;background:rgba(120,100,80,.10);color:#9a9088;font-family:'Noto Sans SC',sans-serif}
.catbar .dot{width:6px;height:6px;border-radius:50%;opacity:.5}
.chev{font-size:16px;color:#b0a898;transition:transform .2s;display:inline-block}
.chev.open{transform:rotate(90deg)}
.bodyin{animation:fadeIn .25s ease;padding-bottom:6px}
.qlabel{font-size:13px;color:#8a8078;margin:10px 0 7px;letter-spacing:.5px}
.ptags{display:flex;flex-wrap:wrap;gap:7px}
.ptag{padding:7px 13px;border-radius:16px;border:1px solid;font-size:13px;background:transparent;letter-spacing:.5px;transition:all .15s}
.ptag.on{color:#fff}
.checkrow{display:flex;gap:10px}
.checkbtn{flex:1;padding:13px 0;border-radius:10px;border:1px solid;font-size:15px;font-weight:600;background:transparent;letter-spacing:1px;transition:all .15s}
.checkbtn.on{color:#fff}
.oneline{width:100%;padding:11px 13px;border:1px solid rgba(120,100,80,.12);border-radius:8px;font-size:15px;color:#3a3228;background:rgba(255,252,248,.6)}
.oneline:focus{border-color:#5B8C6A}
.modesw{display:flex;gap:8px;margin-bottom:10px}
.modesw button{flex:1;padding:9px 0;border-radius:7px;border:1px solid;font-size:13px;font-weight:600;background:transparent}
.modesw button.on{color:#fff}
.autonote{font-size:13px;border-radius:8px;padding:9px 13px;margin-bottom:8px;font-weight:500}
.subh{font-size:14px;font-weight:600;letter-spacing:1px;margin:12px 0 7px;padding-bottom:4px;border-bottom:1px solid rgba(120,100,80,.10)}
.fld{margin-bottom:10px}
.fld label{font-size:14px;font-weight:500;color:#8a8078;margin-bottom:4px;display:block}
.fld input,.fld textarea{width:100%;padding:9px 12px;border:1px solid rgba(120,100,80,.10);border-radius:6px;font-size:15px;line-height:1.7;color:#3a3228;background:rgba(255,252,248,.5);transition:border-color .2s}
.fld input{height:38px}.fld textarea{min-height:58px;resize:none;overflow:hidden}
.note-soft{font-size:12px;color:#9a9088;background:rgba(120,100,80,.05);border-radius:8px;padding:9px 12px;margin:6px 0;line-height:1.6}
.actions{display:flex;gap:10px;margin-top:18px}
.savebtn{flex:1;padding:14px 0;border-radius:10px;border:none;color:#F7F3EE;font-size:15px;font-weight:600;letter-spacing:3px;transition:all .2s}
.delbtn{padding:14px 16px;border-radius:10px;border:1px solid rgba(200,80,60,.2);background:transparent;color:#c8503c;font-size:13px}
.cal{background:rgba(255,252,248,.85);border-radius:14px;padding:16px 14px 12px;border:1px solid rgba(120,100,80,.08)}
.cal .nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 4px}
.cal .nav button{background:none;border:none;font-size:18px;color:#8a8078;padding:2px 8px}
.cal .nav .m{font-family:'Noto Serif SC',serif;font-size:15px;font-weight:600}
.cal .wk{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;text-align:center;margin-bottom:4px}
.cal .wk div{font-size:12px;color:#9a9088;padding:3px 0}
.cal .days{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;justify-items:center}
.cal .day{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:14px;color:#5a5048;position:relative}
.cal .day.today{color:#D4764E;font-weight:600}
.cal .day.sel{background:#5a5048;color:#fff;font-weight:600}
.cal .day .d{position:absolute;bottom:1px;width:4px;height:4px;border-radius:50%;background:#D4764E}
.cal .day.sel .d{background:#fff}
.sectitle{font-size:14px;font-weight:500;color:#8a8078;letter-spacing:2px;margin:18px 0 10px}
.reccard{padding:12px 14px;background:rgba(255,252,248,.7);border-radius:10px;margin-bottom:7px;border:1px solid rgba(120,100,80,.06)}
.reccard .rd{font-size:14px;font-weight:500;margin-bottom:5px}
.reccard .tags{display:flex;gap:8px;flex-wrap:wrap}
.reccard .tags span{font-size:12px;font-weight:500}
.empty{text-align:center;color:#b0a898;font-size:14px;padding:20px;font-style:italic}
.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:22px}
.scard{background:rgba(255,252,248,.7);border-radius:10px;padding:14px 10px;border:1px solid rgba(120,100,80,.06);text-align:center}
.scard .n{font-size:26px;font-weight:700;font-family:'Noto Serif SC',serif}
.scard .l{font-size:12px;color:#9a9088;margin-top:3px}
.insight{background:rgba(255,252,248,.7);border:1px solid rgba(120,100,80,.06);border-radius:12px;padding:16px;margin-bottom:14px}
.insight .it{font-size:15px;font-weight:600;color:#3a3228;margin-bottom:3px;display:flex;align-items:center;gap:7px}

// ===== 金句 =====
var _bySc={};QUOTES.forEach(function(q){(_bySc[q.sc]=_bySc[q.sc]||[]).push(q);});
var _scO=["自我怀疑","撑不下去","遭遇挫折","迷茫无向"];
var QSEQ=[];var _k=0;while(QSEQ.length<QUOTES.length){var _s=_scO[_k%4];_k++;if(_bySc[_s]&&_bySc[_s].length)QSEQ.push(_bySc[_s].shift());}
var curQuote=QSEQ[Math.floor(Math.random()*QSEQ.length)];
function nextQuote(){var n;do{n=QSEQ[Math.floor(Math.random()*QSEQ.length)];}while(n===curQuote&&QSEQ.length>1);curQuote=n;render();}

// ===== 工具 =====
function fmt(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function prs(s){var a=s.split("-").map(Number);return new Date(a[0],a[1]-1,a[2]);}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

// ===== 存储 + 迁移 =====
var STORE_KEY="zaichang-v1";
var entries={};
try{entries=JSON.parse(localStorage.getItem(STORE_KEY)||"{}");}catch(e){entries={};}
function migrate(){
  var changed=false;
  Object.keys(entries).forEach(function(k){
    var e=entries[k];
    if(e._v3)return;
    var n={_ts:e._ts||Date.now(),_v3:true,_tags:(e._tags||[]).slice()};
    var ot=e.train||{},os=e.state||{},oo=e.observe||{},oj=e.journal||{};
    // 运动打卡：旧有训练内容则视为完成
    n.sport=(ot.main||ot.spec||ot.anaerobic||ot.wakeup||ot.cardio)?"done":"";
    // 口播一句话：旧 topic
    n.speech1=ot.topic||(e.speech1||"");
    // 状态：情绪用_tags；事件<-disrupt；分析<-moodnote+predict；饮食<-body
    n.state={
      event:os.disrupt||os.event||"",
      analysis:[os.moodnote,os.predict].filter(Boolean).join("　")||os.analysis||"",
      diet:os.body||os.diet||""
    };
    // 训练：唤醒/无氧(main+spec)/有氧/感受
    n.train={wakeup:ot.wakeup||"",anaerobic:[ot.main,ot.spec,ot.anaerobic].filter(Boolean).join(" ")||"",cardio:ot.cardio||"",feel:ot.feel||""};
    // 口播详细：旧 orec 文本放 free，mode=free
    n.speech={mode:(e.speech&&e.speech.mode)||"free",topic:ot.topic||"",o:"",r:"",e:"",c:"",free:ot.orec||"",review:ot.review||""};
    n.observe={where:oo.where||"",funnel:oo.funnel||"",insight:oo.insight||""};
    n.journal={text:oj.text||""};
    entries[k]=n;changed=true;
  });
  if(changed){try{localStorage.setItem(STORE_KEY,JSON.stringify(entries));}catch(e){}}
}
migrate();
function persist(){try{localStorage.setItem(STORE_KEY,JSON.stringify(entries));}catch(e){}}

// ===== 状态 =====
var state={tab:"write",selDate:new Date(),exp:null,calY:new Date().getFullYear(),calM:new Date().getMonth(),searchOpen:false,searchQ:""};
var draft={},dtags=[],dsport="",dspeech1="",dspeechMode="free";
function loadDraft(){
  var k=fmt(state.selDate),e=entries[k];
  if(e){draft=JSON.parse(JSON.stringify(e));dtags=(e._tags||[]).slice();dsport=e.sport||"";dspeech1=e.speech1||"";dspeechMode=(e.speech&&e.speech.mode)||"free";}
  else{draft={};dtags=[];dsport="";dspeech1="";dspeechMode="free";}
}
loadDraft();
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.style.display="block";setTimeout(function(){t.style.display="none";},2000);}
function splitText(d){var w=d.getDay();if(w===0)return"今天周日 · 休息日";if(w===1||w===3||w===5)return"今天周"+WK[w]+" · 上肢训练（吊杆·俯卧撑）";return"今天周"+WK[w]+" · 下肢训练（深蹲）";}

function gv(cid,key){return (draft[cid]||{})[key]||"";}
function onF(cid,key,el){if(!draft[cid])draft[cid]={};draft[cid][key]=el.value;if(el.tagName==="TEXTAREA"){el.style.height="auto";el.style.height=Math.max(58,el.scrollHeight)+"px";}}

function hasAny(){
  if(dtags.length||dsport||dspeech1.trim())return true;
  var ok=false;
  ["state","train","speech","observe","journal"].forEach(function(cid){var o=draft[cid]||{};Object.keys(o).forEach(function(kk){if(o[kk]&&String(o[kk]).trim())ok=true;});});
  return ok;
}
function save(){
  if(!hasAny()){toast("还没有填写内容");return;}
  var k=fmt(state.selDate);
  var clean={_ts:Date.now(),_v3:true,_tags:dtags.slice(),sport:dsport,speech1:dspeech1};
  if(draft.speech)draft.speech.mode=dspeechMode;
  ["state","train","speech","observe","journal"].forEach(function(cid){if(draft[cid])clean[cid]=draft[cid];});
  entries[k]=clean;persist();toast("已保存 ✓");render();
}
function del(){var k=fmt(state.selDate);if(!entries[k])return;if(!confirm("确定删除"+(state.selDate.getMonth()+1)+"月"+state.selDate.getDate()+"日的记录吗？"))return;delete entries[k];persist();loadDraft();toast("已删除");render();}

function setTab(t){state.tab=t;render();}
function tgExp(id){state.exp=state.exp===id?null:id;render();}
function tgTag(p){var i=dtags.indexOf(p);if(i>=0)dtags.splice(i,1);else dtags.push(p);render();}
function setSport(v){dsport=dsport===v?"":v;render();}
function setSM(m){dspeechMode=m;if(!draft.speech)draft.speech={};draft.speech.mode=m;render();}
function selDate(s){state.selDate=prs(s);state.tab="write";state.exp=null;loadDraft();render();}
function backToday(){state.selDate=new Date();loadDraft();render();}
function calNav(dir){state.calM+=dir;if(state.calM<0){state.calM=11;state.calY--;}if(state.calM>11){state.calM=0;state.calY++;}render();}
function toggleSearch(){state.searchOpen=!state.searchOpen;if(state.searchOpen){state.tab="search";}else{state.tab="write";}render();}
function onSearch(v){state.searchQ=v;renderSearchResults();}

function entryFilled(e){
  var cats=[];
  if((e._tags||[]).length||e.sport||(e.state&&(e.state.event||e.state.analysis||e.state.diet)))cats.push(QUICK[0]);
  if(e.sport||((e.train)&&(e.train.wakeup||e.train.anaerobic||e.train.cardio||e.train.feel)))cats.push(FULL[0]);
  if((e.speech1||"").trim()||((e.speech)&&(e.speech.topic||e.speech.free||e.speech.o||e.speech.review)))cats.push(FULL[1]);
  if(e.observe&&(e.observe.where||e.observe.funnel||e.observe.insight))cats.push(FULL[2]);
  if(e.journal&&e.journal.text)cats.push(FULL[3]);
  return cats;
}

// ===== 渲染 =====
function fld(cid,f){
  var v=esc(gv(cid,f.key));var h='<div class="fld">';
  if(f.label)h+='<label>'+f.label+'</label>';
  if(f.multi)h+='<textarea placeholder="'+esc(f.ph)+'" oninput="onF(\''+cid+'\',\''+f.key+'\',this)" onfocus="this.style.borderColor=\'#999\'" onblur="this.style.borderColor=\'rgba(120,100,80,.10)\'">'+v+'</textarea>';
  else h+='<input value="'+v+'" placeholder="'+esc(f.ph)+'" oninput="onF(\''+cid+'\',\''+f.key+'\',this)" onfocus="this.style.borderColor=\'#999\'" onblur="this.style.borderColor=\'rgba(120,100,80,.10)\'">';
  return h+'</div>';
}
function catBar(cat,filled){
  var ex=state.exp===cat.id;
  return '<div class="catbar" onclick="tgExp(\''+cat.id+'\')"><div class="left"><span class="ico" style="color:'+cat.color+'">'+cat.icon+'</span><span class="lbl" style="color:'+cat.color+'">'+cat.label+'</span>'+(cat.tag?'<span class="tag">'+cat.tag+'</span>':'')+(filled?'<span class="dot" style="background:'+cat.color+'"></span>':'')+'</div><span class="chev'+(ex?" open":"")+'">›</span></div>';
}
function render(){
  var d=state.selDate;
  var h='<div class="hdr"><div><h1>在 场</h1><p>每天，真的在一次</p></div><button class="searchbtn" onclick="toggleSearch()">'+(state.tab==="search"?"×":"🔍")+'</button></div>';
  if(state.tab!=="search")h+='<div class="quote"><div class="s">'+esc(curQuote.s)+'</div><div class="meta"><span class="sc">— 给「'+curQuote.sc+'」的你</span><button class="refresh" onclick="nextQuote()">换一句 ↻</button></div></div>';
  if(state.tab==="search"){h+='<div class="body">'+renderSearch()+'</div>';document.getElementById("app").innerHTML=h;var si=document.getElementById("searchInput");if(si){si.focus();}return;}
  h+='<div class="tabs">';
  [["write","记录"],["cal","日历"],["stats","数据"]].forEach(function(t){h+='<button class="tab'+(state.tab===t[0]?" on":"")+'" onclick="setTab(\''+t[0]+'\')">'+t[1]+'</button>';});
  h+='</div><div class="body">';
  if(state.tab==="write")h+=renderWrite();
  else if(state.tab==="cal")h+=renderCal();
  else h+=renderStats();
  h+='</div>';
  document.getElementById("app").innerHTML=h;
  document.querySelectorAll("textarea").forEach(function(t){t.style.height="auto";t.style.height=Math.max(58,t.scrollHeight)+"px";});
}
function renderWrite(){
  var d=state.selDate,isToday=fmt(d)===fmt(new Date());
  var h='<div class="fade"><div class="dline"><div><div class="d">'+(d.getMonth()+1)+'月'+d.getDate()+'日 · 星期'+WK[d.getDay()]+'</div>'+(isToday?'<div class="today">今天</div>':'')+'</div>';
  if(!isToday)h+='<button class="backbtn" onclick="backToday()">回到今天</button>';
  h+='</div>';
  // 今日三件
  h+='<div class="grpttl">今日三件 · 快速打卡</div>';
  // 状态
  var stf=dtags.length>0||(draft.state&&(draft.state.event||draft.state.analysis||draft.state.diet));
  h+='<div class="cat" style="border-left-color:#C4915E">'+catBar(QUICK[0],stf);
  if(state.exp==="state"){
    h+='<div class="bodyin"><div class="subh" style="color:#C4915E">情绪</div><div class="qlabel">情绪模式（可多选，没有就不点）</div><div class="ptags">';
    PATS.forEach(function(p){var on=dtags.indexOf(p)>=0;h+='<button class="ptag'+(on?" on":"")+'" style="border-color:#C4915E66;'+(on?"background:#C4915E;":"color:#C4915E")+'" onclick="event.stopPropagation();tgTag(\''+p+'\')">'+p+'</button>';});
    h+='</div><div class="subh" style="color:#C4915E">事件</div>'+fld("state",{key:"event",label:"今天发生了什么 / 被什么打断",ph:"重大事项、突发情况…（可留空）",multi:true});
    h+='<div class="subh" style="color:#C4915E">分析</div>'+fld("state",{key:"analysis",label:"你怎么看这件事 / 复盘",ph:"触发了什么情绪？是哪个模式？如果重来会怎样？",multi:true});
    h+='<div class="subh" style="color:#C4915E">饮食</div><div class="note-soft">想记就记，不记也没关系。这一栏不进统计、不打分。</div>'+fld("state",{key:"diet",label:"吃了什么 + 当时状态",ph:"照实记，不评判（可留空）",multi:true});
    h+='</div>';
  }
  h+='</div>';
  // 运动打卡
  h+='<div class="cat" style="border-left-color:#D4764E">'+catBar(QUICK[1],dsport!=="");
  if(state.exp==="sport"){
    h+='<div class="bodyin"><div class="checkrow">';
    [["done","✓ 完成了","#D4764E"],["rest","休息日","#9a9088"],["miss","没做成","#C46B5E"]].forEach(function(o){var on=dsport===o[0];h+='<button class="checkbtn'+(on?" on":"")+'" style="border-color:'+o[2]+'66;'+(on?"background:"+o[2]+";color:#fff;":"color:"+o[2])+'" onclick="event.stopPropagation();setSport(\''+o[0]+'\')">'+o[1]+'</button>';});
    h+='</div><div class="note-soft">想记详细训练内容，到下面「训练」里展开。</div></div>';
  }
  h+='</div>';
  // 口播一句话
  h+='<div class="cat" style="border-left-color:#5B8C6A">'+catBar(QUICK[2],dspeech1.trim()!=="");
  if(state.exp==="speech1"){h+='<div class="bodyin"><input class="oneline" placeholder="今天练了什么 / 想到什么，一句话即可" value="'+esc(dspeech1)+'" oninput="dspeech1=this.value"></div>';}
  h+='</div>';
  // 完整框架
  h+='<div class="grpttl" style="margin-top:22px">想认真记 · 完整框架</div>';
  // 训练
  h+='<div class="cat" style="border-left-color:#D4764E">'+catBar(FULL[0],false);
  if(state.exp==="train"){
    var w=d.getDay(),rest=(w===0);
    h+='<div class="bodyin"><div class="subh" style="color:#D4764E">① 唤醒操</div>'+fld("train",{key:"wakeup",label:"唤醒操（10min）",ph:"完成 / 跳过 + 今早状态"});
    h+='<div class="subh" style="color:#D4764E">② 无氧</div>';
    h+='<div class="autonote" style="background:'+(rest?"rgba(120,100,80,.06)":"#D4764E14")+';color:'+(rest?"#9a9088":"#D4764E")+'">📅 '+splitText(d)+'</div>';
    h+=fld("train",{key:"anaerobic",label:"无氧训练内容",ph:"动作、组数、次数、进度",multi:true});
    h+='<div class="subh" style="color:#D4764E">③ 有氧</div>'+fld("train",{key:"cardio",label:"有氧",ph:"多走一站 / 步数 / 其他"});
    h+='<div class="subh" style="color:#D4764E">④ 身体其他感受</div>'+fld("train",{key:"feel",label:"身体其他感受",ph:"泵感、力竭、酸痛、代偿…",multi:true});
    h+='</div>';
  }
  h+='</div>';
  // 口播
  h+='<div class="cat" style="border-left-color:#5B8C6A">'+catBar(FULL[1],false);
  if(state.exp==="speech"){
    h+='<div class="bodyin"><div class="modesw">';
    [["struct","结构化记"],["free","随便记"]].forEach(function(o){var on=dspeechMode===o[0];h+='<button class="'+(on?"on":"")+'" style="border-color:#5B8C6A66;'+(on?"background:#5B8C6A;":"color:#5B8C6A")+'" onclick="event.stopPropagation();setSM(\''+o[0]+'\')">'+o[1]+'</button>';});
    h+='</div>'+fld("speech",{key:"topic",label:"题目（自由定）",ph:"今天想讲的话题"});
    if(dspeechMode==="struct"){h+=fld("speech",{key:"o",label:"O · 观点",ph:"核心论点，一句话"})+fld("speech",{key:"r",label:"R · 理由",ph:"为什么这么说"})+fld("speech",{key:"e",label:"E · 案例",ph:"一个具体的例子"})+fld("speech",{key:"c",label:"C · 总结",ph:"回扣观点"});}
    else{h+=fld("speech",{key:"free",label:"随便记",ph:"想到什么写什么，不用管结构",multi:true});}
    h+=fld("speech",{key:"review",label:"录音 & 自评",ph:"是否录音、时长、语速、口头禅…",multi:true})+'</div>';
  }
  h+='</div>';
  // 观察
  h+='<div class="cat" style="border-left-color:#7A6EA0">'+catBar(FULL[2],false);
  if(state.exp==="observe"){h+='<div class="bodyin">'+fld("observe",{key:"where",label:"时间·地点·业态",ph:"在哪、什么类型"})+fld("observe",{key:"funnel",label:"吸引 → 购买 → 流失",ph:"什么吸引你停下？什么让你掏钱？什么让你扭头就走？",multi:true})+fld("observe",{key:"insight",label:"启发 & 可迁移",ph:"对「被理解感」的启发，能用在国宾馆/创业的地方",multi:true})+'</div>';}
  h+='</div>';
  // 日记
  h+='<div class="cat" style="border-left-color:#5A7D9A">'+catBar(FULL[3],false);
  if(state.exp==="journal"){h+='<div class="bodyin">'+fld("journal",{key:"text",label:"",ph:"今天还想写点什么…",multi:true})+'</div>';}
  h+='</div>';
  var hc=hasAny();
  h+='<div class="actions"><button class="savebtn" style="background:'+(hc?"#3a3228":"#d0c8be")+'" onclick="save()">保 存</button>';
  if(entries[fmt(d)])h+='<button class="delbtn" onclick="del()">删除</button>';
  h+='</div></div>';
  return h;
}
function renderCal(){
  var dim=new Date(state.calY,state.calM+1,0).getDate(),fd=new Date(state.calY,state.calM,1).getDay();
  var today=fmt(new Date()),sel=fmt(state.selDate);
  var h='<div class="fade"><div class="cal"><div class="nav"><button onclick="calNav(-1)">‹</button><span class="m">'+state.calY+'年 '+MO[state.calM]+'</span><button onclick="calNav(1)">›</button></div>';
  h+='<div class="wk">'+WK.map(function(w){return '<div>'+w+'</div>';}).join("")+'</div><div class="days">';
  for(var i=0;i<fd;i++)h+='<div></div>';
  for(var dd=1;dd<=dim;dd++){var ds=state.calY+"-"+String(state.calM+1).padStart(2,"0")+"-"+String(dd).padStart(2,"0");var cls="day"+(ds===today?" today":"")+(ds===sel?" sel":"");h+='<div class="'+cls+'" onclick="selDate(\''+ds+'\')">'+dd+(entries[ds]?'<span class="d"></span>':"")+'</div>';}
  h+='</div></div><div class="sectitle">近期记录</div>';
  var keys=Object.keys(entries).sort().reverse().slice(0,10);
  if(!keys.length)h+='<div class="empty">还没有记录</div>';
  else keys.forEach(function(k){var dt=prs(k),fc=entryFilled(entries[k]);h+='<div class="reccard" onclick="selDate(\''+k+'\')"><div class="rd">'+(dt.getMonth()+1)+'月'+dt.getDate()+'日 · 星期'+WK[dt.getDay()]+'</div><div class="tags">';fc.forEach(function(c){h+='<span style="color:'+c.color+'">'+c.icon+' '+c.label+'</span>';});h+='</div></div>';});
  return h+'</div>';
}

// ===== 数据页：四个分析 =====
function renderStats(){
  var es=Object.keys(entries);
  var totalDays=es.length;
  var mk=new Date().getFullYear()+"-"+String(new Date().getMonth()+1).padStart(2,"0");
  var monthDays=es.filter(function(k){return k.indexOf(mk)===0;}).length;
  var streak=0,sd=new Date();while(true){var k=fmt(sd);if(entries[k]&&entryFilled(entries[k]).length>0){streak++;sd.setDate(sd.getDate()-1);}else break;}
  var totalItems=0;es.forEach(function(k){totalItems+=entryFilled(entries[k]).length;});
  var h='<div class="fade"><div class="stats">';
  [["累计天数",totalDays],["本月记录",monthDays],["连续天数",streak],["总条目",totalItems]].forEach(function(s){h+='<div class="scard"><div class="n">'+s[1]+'</div><div class="l">'+s[0]+'</div></div>';});
  h+='</div>';
  h+='<div class="sectitle">洞察 · 模式识别</div>';
  h+=aTrend()+aSport()+aBreak()+aHabit();
  return h+'</div>';
}
// 1 情绪标签趋势
function aTrend(){
  var withTags=Object.keys(entries).filter(function(k){return (entries[k]._tags||[]).length;});
  var h='<div class="insight"><div class="it">📈 情绪回路趋势</div><div class="isub">看你最想改善的回路，是在变多还是变少</div>';
  if(withTags.length<8)return h+'<div class="lock">再积累 '+(8-withTags.length)+' 天带情绪标签的记录解锁</div></div>';
  var now=new Date();var thisMk=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  var lm=new Date(now.getFullYear(),now.getMonth()-1,1);var lastMk=lm.getFullYear()+"-"+String(lm.getMonth()+1).padStart(2,"0");
  var tc={},lc={};PATS.forEach(function(p){tc[p]=0;lc[p]=0;});
  Object.keys(entries).forEach(function(k){(entries[k]._tags||[]).forEach(function(t){if(k.indexOf(thisMk)===0&&tc[t]!==undefined)tc[t]++;if(k.indexOf(lastMk)===0&&lc[t]!==undefined)lc[t]++;});});
  PATS.forEach(function(p){var diff=tc[p]-lc[p];var a=diff<0?'<span style="color:#5B8C6A">↓好转 '+Math.abs(diff)+'</span>':diff>0?'<span style="color:#C46B5E">↑增多 '+diff+'</span>':'<span style="color:#9a9088">持平</span>';h+='<div class="arow"><span style="color:#5a5048">'+p+'</span><span style="font-size:13px"><span style="color:#a09888">上月'+lc[p]+'→本月'+tc[p]+'</span>　'+a+'</span></div>';});
  return h+'</div>';
}
// 2 运动坚持率
function aSport(){
  var withSport=Object.keys(entries).filter(function(k){return entries[k].sport;});
  var h='<div class="insight"><div class="it">🏃 运动坚持率</div><div class="isub">本月真正完成训练的占比</div>';
  if(withSport.length<5)return h+'<div class="lock">再打卡 '+(5-withSport.length)+' 天运动解锁</div></div>';
  var mk=new Date().getFullYear()+"-"+String(new Date().getMonth()+1).padStart(2,"0");
  var mKeys=Object.keys(entries).filter(function(k){return k.indexOf(mk)===0&&entries[k].sport;});
  var done=mKeys.filter(function(k){return entries[k].sport==="done";}).length;
  var miss=mKeys.filter(function(k){return entries[k].sport==="miss";}).length;
  var rest=mKeys.filter(function(k){return entries[k].sport==="rest";}).length;
  var rate=mKeys.length?Math.round(done/mKeys.length*100):0;
  h+='<div style="text-align:center;padding:6px 0 10px"><div class="big">'+rate+'%</div><div style="font-size:13px;color:#8a8078;margin-top:2px">本月打卡的'+mKeys.length+'天里，'+done+'天完成了训练</div></div>';
  h+='<div class="arow"><span style="color:#D4764E">✓ 完成</span><span>'+done+' 天</span></div><div class="arow"><span style="color:#9a9088">休息日</span><span>'+rest+' 天</span></div><div class="arow"><span style="color:#C46B5E">没做成</span><span>'+miss+' 天</span></div>';
  return h+'</div>';
}
// 3 中断诱因
function aBreak(){
  var miss=Object.keys(entries).filter(function(k){return entries[k].sport==="miss";});
  var h='<div class="insight"><div class="it">⛓️ 中断诱因</div><div class="isub">运动「没做成」的那些天，发生了什么</div>';
  var withSport=Object.keys(entries).filter(function(k){return entries[k].sport;});
  if(withSport.length<5)return h+'<div class="lock">再打卡 '+(5-withSport.length)+' 天运动解锁</div></div>';
  if(!miss.length)return h+'<div style="font-size:14px;color:#5B8C6A;line-height:1.7;padding:4px 0">目前还没有「没做成」的记录。保持住。</div></div>';
  var tagCnt={},eventN=0;
  miss.forEach(function(k){(entries[k]._tags||[]).forEach(function(t){tagCnt[t]=(tagCnt[t]||0)+1;});if(((entries[k].state||{}).event||"").trim())eventN++;});
  h+='<div style="font-size:14px;line-height:1.7;color:#5a5048;padding:4px 0 8px">共 '+miss.length+' 天没做成，其中 <b style="color:#C46B5E">'+eventN+'</b> 天当天有「事件」记录。</div>';
  var arr=Object.keys(tagCnt).map(function(t){return [t,tagCnt[t]];}).sort(function(a,b){return b[1]-a[1];});
  if(arr.length){h+='<div style="font-size:13px;color:#a09888;margin-bottom:2px">中断日最常见的情绪：</div>';arr.slice(0,3).forEach(function(x){h+='<div class="arow"><span style="color:#5a5048">'+x[0]+'</span><span>'+x[1]+' 天</span></div>';});}
  return h+'</div>';
}
// 4 记录习惯
function aHabit(){
  var es=Object.keys(entries);
  var h='<div class="insight"><div class="it">🗂️ 记录习惯</div><div class="isub">你最常记哪项、最少碰哪项——看看自己实际在意什么</div>';
  if(es.length<5)return h+'<div class="lock">再记 '+(5-es.length)+' 天解锁</div></div>';
  var cats=[QUICK[0],FULL[0],FULL[1],FULL[2],FULL[3]];
  var cnt={};cats.forEach(function(c){cnt[c.id]=0;});
  es.forEach(function(k){entryFilled(entries[k]).forEach(function(c){if(cnt[c.id]!==undefined)cnt[c.id]++;});});
  var maxC=Math.max(1,Math.max.apply(null,cats.map(function(c){return cnt[c.id];})));
  cats.forEach(function(c){var n=cnt[c.id],w=Math.round(n/maxC*100);h+='<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:14px;color:'+c.color+'">'+c.icon+' '+c.label+'</span><span style="font-size:13px;color:#8a8078">'+n+' 天</span></div><div style="height:5px;background:rgba(120,100,80,.06);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+w+'%;background:'+c.color+';opacity:.7;border-radius:3px;min-width:'+(n>0?4:0)+'px"></div></div></div>';});
  return h+'</div>';
}

// ===== 搜索 =====
function renderSearch(){
  return '<input class="searchbar" id="searchInput" placeholder="搜索所有记录，比如：领导、汇报、暴食…" value="'+esc(state.searchQ)+'" oninput="onSearch(this.value)"><div id="searchResults">'+searchResultsHTML()+'</div>';
}
function renderSearchResults(){var el=document.getElementById("searchResults");if(el)el.innerHTML=searchResultsHTML();}
function searchResultsHTML(){
  var q=state.searchQ.trim();
  if(!q)return '<div class="empty">输入关键词，搜索你写过的所有内容</div>';
  var hits=[];
  Object.keys(entries).sort().reverse().forEach(function(k){
    var e=entries[k],texts=[];
    if(e.state){texts.push(e.state.event,e.state.analysis,e.state.diet);}
    if(e.speech1)texts.push(e.speech1);
    if(e.train){texts.push(e.train.wakeup,e.train.anaerobic,e.train.cardio,e.train.feel);}
    if(e.speech){texts.push(e.speech.topic,e.speech.o,e.speech.r,e.speech.e,e.speech.c,e.speech.free,e.speech.review);}
    if(e.observe){texts.push(e.observe.where,e.observe.funnel,e.observe.insight);}
    if(e.journal)texts.push(e.journal.text);
    (e._tags||[]).forEach(function(t){texts.push(t);});
    var joined=texts.filter(Boolean).join("　");
    if(joined.indexOf(q)>=0){
      var idx=joined.indexOf(q);
      var snip=joined.substring(Math.max(0,idx-12),idx+q.length+24);
      snip=esc(snip).replace(new RegExp(esc(q),"g"),"<em>"+esc(q)+"</em>");
      hits.push({k:k,snip:snip});
    }
  });
  if(!hits.length)return '<div class="empty">没有找到包含「'+esc(q)+'」的记录</div>';
  var h='<div style="font-size:13px;color:#9a9088;margin-bottom:10px">找到 '+hits.length+' 条</div>';
  hits.forEach(function(x){var dt=prs(x.k);h+='<div class="hit" onclick="selDate(\''+x.k+'\')"><div class="hd">'+(dt.getMonth()+1)+'月'+dt.getDate()+'日 · 星期'+WK[dt.getDay()]+'</div><div class="hs">…'+x.snip+'…</div></div>';});
  return h;
}

render();
</script>
