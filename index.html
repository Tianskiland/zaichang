<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;color:#3a3228;
    background:linear-gradient(165deg,#F7F3EE 0%,#EDE8E0 50%,#E8E0D6 100%);background-attachment:fixed;min-height:100vh}
  #app{max-width:520px;margin:0 auto;padding-bottom:120px}
  textarea,input{font-family:inherit}
  textarea::placeholder,input::placeholder{color:#c0b8ae}
  textarea:focus,input:focus{outline:none}
  button{font-family:inherit;cursor:pointer}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes toastIn{from{opacity:0;transform:translateY(10px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
  .fade{animation:fadeIn .3s ease}
  .hdr{padding:34px 24px 14px;background:linear-gradient(180deg,rgba(90,80,72,.04),transparent)}
  .hdr h1{font-family:'Noto Serif SC',serif;font-size:32px;font-weight:700;letter-spacing:8px;margin-bottom:4px}
  .hdr p{font-size:13px;color:#a09888;letter-spacing:2px;font-weight:300}
  .tabs{display:flex;padding:0 24px;margin-bottom:18px;border-bottom:1px solid rgba(120,100,80,.08)}
  .tab{background:none;border:none;padding:9px 16px;font-size:15px;font-weight:400;color:#a09888;
    border-bottom:2px solid transparent;letter-spacing:2px;transition:all .2s}
  .tab.on{color:#3a3228;font-weight:600;border-bottom-color:#3a3228}
  .body{padding:0 24px}
  .dline{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .dline .d{font-family:'Noto Serif SC',serif;font-size:20px;font-weight:600;letter-spacing:2px}
  .dline .today{font-size:12px;color:#D4764E;font-weight:500;margin-top:2px;letter-spacing:1px}
  .backbtn{background:none;border:1px solid rgba(120,100,80,.15);border-radius:8px;padding:5px 12px;font-size:13px;color:#8a8078;letter-spacing:1px}
  .cat{margin-bottom:16px;border-left:3px solid;padding-left:14px}
  .catbar{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
  .catbar .left{display:flex;align-items:center;gap:7px;font-family:'Noto Serif SC',serif}
  .catbar .ico{font-size:15px;font-weight:600}
  .catbar .lbl{font-size:15px;font-weight:600;letter-spacing:2px}
  .catbar .dot{width:6px;height:6px;border-radius:50%;opacity:.5}
  .catbar .right{display:flex;align-items:center;gap:8px}
  .exbtn{background:none;border:1px solid;border-radius:6px;padding:3px 10px;font-size:12px;letter-spacing:1px}
  .chev{font-size:16px;color:#b0a898;transition:transform .2s;display:inline-block}
  .chev.open{transform:rotate(90deg)}
  .preview{font-size:14px;color:#8a8078;margin-top:4px;line-height:1.6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fld{margin-bottom:10px}
  .fld label{font-size:14px;font-weight:500;color:#8a8078;margin-bottom:4px;display:block;letter-spacing:1px}
  .fld input,.fld textarea{width:100%;padding:8px 12px;border:1px solid rgba(120,100,80,.10);border-radius:6px;
    font-size:15px;line-height:1.7;color:#3a3228;background:rgba(255,252,248,.5);transition:border-color .2s}
  .fld input{height:36px}
  .fld textarea{min-height:64px;resize:none;overflow:hidden}
  .splithint{border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .splithint .t{font-size:15px;font-weight:600;letter-spacing:1px}
  .splithint .v{font-size:15px;font-weight:500}
  .picker{margin-bottom:12px}
  .picker .row{display:flex;gap:8px}
  .picker .pbtn{padding:8px 0;border-radius:7px;border:1px solid;background:transparent;font-size:14px;font-weight:600;letter-spacing:2px}
  .picker .panel{background:rgba(255,252,248,.7);border:1px solid rgba(120,100,80,.10);border-radius:10px;padding:12px;margin-top:10px}
  .picker .ctabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
  .picker .ctab{padding:4px 10px;border-radius:14px;border:none;font-size:13px;letter-spacing:.5px;transition:all .15s}
  .picker .topic{padding:8px 10px;border-radius:6px;font-size:15px;color:#5a5048;line-height:1.5;transition:background .15s}
  .excard{background:rgba(255,250,240,.92);border:1px solid;border-radius:10px;padding:14px 16px;margin-bottom:14px}
  .excard .h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .excard .h .t{font-size:14px;font-weight:600;letter-spacing:2px}
  .excard .h .x{background:none;border:none;font-size:19px;color:#b0a898;line-height:1}
  .excard .k{font-size:13px;font-weight:500;color:#a09888;margin-bottom:2px;letter-spacing:1px}
  .excard .v{font-size:15px;line-height:1.8;color:#5a5048;white-space:pre-wrap;margin-bottom:8px}
  .excard .rule{margin-top:6px;padding-top:10px;border-top:1px dashed rgba(120,100,80,.12);font-size:13px;color:#a09888;line-height:1.7;white-space:pre-wrap}
  .rulehint{font-size:12px;color:#b0a898;margin-top:4px;margin-bottom:6px;line-height:1.6;border-top:1px dashed rgba(120,100,80,.08);padding-top:8px;white-space:pre-wrap}
  .actions{display:flex;gap:10px;margin-top:20px}
  .savebtn{flex:1;padding:13px 0;border-radius:10px;border:none;color:#F7F3EE;font-size:15px;font-weight:600;letter-spacing:3px;transition:all .2s}
  .delbtn{padding:13px 16px;border-radius:10px;border:1px solid rgba(200,80,60,.2);background:transparent;color:#c8503c;font-size:14px;letter-spacing:1px}
  .cal{background:rgba(255,252,248,.85);border-radius:14px;padding:16px 14px 12px;border:1px solid rgba(120,100,80,.08)}
  .cal .nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 4px}
  .cal .nav button{background:none;border:none;font-size:21px;color:#8a8078;padding:2px 8px}
  .cal .nav .m{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:600;letter-spacing:1px}
  .cal .wk{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;text-align:center;margin-bottom:4px}
  .cal .wk div{font-size:12px;color:#9a9088;font-weight:500;padding:3px 0}
  .cal .days{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;justify-items:center}
  .cal .day{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:14px;color:#5a5048;position:relative}
  .cal .day.today{color:#D4764E;font-weight:600}
  .cal .day.sel{background:#5a5048;color:#fff;font-weight:600}
  .cal .day .d{position:absolute;bottom:1px;width:4px;height:4px;border-radius:50%;background:#D4764E}
  .cal .day.sel .d{background:#fff}
  .sectitle{font-size:14px;font-weight:500;color:#8a8078;letter-spacing:2px;margin:18px 0 10px}
  .reccard{padding:12px 14px;background:rgba(255,252,248,.7);border-radius:10px;margin-bottom:7px;border:1px solid rgba(120,100,80,.06)}
  .reccard .rd{font-size:15px;font-weight:500;margin-bottom:5px}
  .reccard .tags{display:flex;gap:8px;flex-wrap:wrap}
  .reccard .tags span{font-size:12px;font-weight:500;letter-spacing:1px}
  .empty{text-align:center;color:#b0a898;font-size:15px;padding:20px;font-style:italic}
  .stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:22px}
  .scard{background:rgba(255,252,248,.7);border-radius:10px;padding:14px 10px;border:1px solid rgba(120,100,80,.06);text-align:center}
  .scard .n{font-size:28px;font-weight:700;font-family:'Noto Serif SC',serif}
  .scard .l{font-size:12px;color:#9a9088;margin-top:3px;letter-spacing:1px}
  .barrow{margin-bottom:12px}
  .barrow .bh{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
  .barrow .bh .bl{font-size:14px;font-weight:500;letter-spacing:1px}

var WK=["日","一","二","三","四","五","六"];
var MO=["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];
function fmt(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function prs(s){var a=s.split("-").map(Number);return new Date(a[0],a[1]-1,a[2]);}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

var STORE_KEY="zaichang-v1";
var entries={};
try{entries=JSON.parse(localStorage.getItem(STORE_KEY)||"{}");}catch(e){entries={};}
function persist(){try{localStorage.setItem(STORE_KEY,JSON.stringify(entries));}catch(e){}}

var state={tab:"write", selDate:new Date(), expandedCat:null, showEx:{}, calY:new Date().getFullYear(), calM:new Date().getMonth()};
var draft={};
function loadDraft(){var k=fmt(state.selDate);draft=entries[k]?JSON.parse(JSON.stringify(entries[k])):{};}
loadDraft();

function splitFor(date){
  var wd=date.getDay();
  if(wd===0)return{type:"rest",text:"周日 · 休息日（可做唤醒操 + 散步）"};
  if(wd===1||wd===3||wd===5)return{type:"upper",text:"周"+WK[wd]+" · 上肢训练（吊杆 · 俯卧撑）"};
  return{type:"lower",text:"周"+WK[wd]+" · 下肢训练（深蹲）"};
}
function catFilled(catId){
  var cd=draft[catId]||{};var cat=CATS.find(function(c){return c.id===catId;});
  return cat.fields.some(function(f){return cd[f.key]&&cd[f.key].trim();});
}
function entryFilledCats(entry){
  return CATS.filter(function(c){return c.fields.some(function(f){return (entry[c.id]||{})[f.key]&&(entry[c.id]||{})[f.key].trim();});});
}
function hasAnyContent(){return CATS.some(function(c){return catFilled(c.id);});}

function toast(msg){var t=document.getElementById("toast");t.textContent=msg;t.style.display="block";setTimeout(function(){t.style.display="none";},2000);}

// ---- field updates without re-render (preserve focus) ----
function onField(catId,key,el){
  if(!draft[catId])draft[catId]={};
  draft[catId][key]=el.value;
  if(el.tagName==="TEXTAREA"){el.style.height="auto";el.style.height=Math.max(64,el.scrollHeight)+"px";}
}

function pickTopic(t){
  if(!draft.speech)draft.speech={};
  draft.speech.topic=t;
  render();
  setTimeout(function(){var inp=document.querySelector('[data-fld="speech.topic"]');if(inp){inp.focus();}},50);
}

function save(){
  if(!hasAnyContent()){toast("还没有填写内容");return;}
  var k=fmt(state.selDate);
  var clean={};
  CATS.forEach(function(c){
    if(draft[c.id]){clean[c.id]=draft[c.id];}
  });
  clean._ts=Date.now();
  entries[k]=clean;
  persist();
  toast("已保存 ✓");
  render();
}
function del(){
  var k=fmt(state.selDate);
  if(!entries[k])return;
  if(!confirm("确定删除"+(state.selDate.getMonth()+1)+"月"+state.selDate.getDate()+"日的记录吗？"))return;
  delete entries[k];persist();draft={};toast("已删除");render();
}

function setTab(t){state.tab=t;render();}
function toggleCat(id){state.expandedCat=state.expandedCat===id?null:id;render();}
function toggleEx(id,e){if(e)e.stopPropagation();state.showEx[id]=!state.showEx[id];render();}
function selectDate(s){state.selDate=prs(s);state.tab="write";state.expandedCat=null;loadDraft();render();}
function backToday(){state.selDate=new Date();loadDraft();render();}
function calNav(dir){
  state.calM+=dir;
  if(state.calM<0){state.calM=11;state.calY--;}
  if(state.calM>11){state.calM=0;state.calY++;}
  render();
}

// ---- topic picker state ----
var pickerOpen=false, pickerCat=0;
function togglePicker(){pickerOpen=!pickerOpen;render();}
function setPickerCat(i){pickerCat=i;render();}
function randomTopic(){
  var all=[];CATS.find(function(c){return c.id==="speech";}).topicLibrary.forEach(function(g){all=all.concat(g.topics);});
  pickTopic(all[Math.floor(Math.random()*all.length)]);
  pickerOpen=false;
}

// ================= RENDER =================
function render(){
  var html="";
  html+='<div class="hdr"><h1>在 场</h1><p>每天，真的在一次</p></div>';
  html+='<div class="tabs">';
  [["write","记录"],["cal","日历"],["stats","数据"]].forEach(function(t){
    html+='<button class="tab'+(state.tab===t[0]?" on":"")+'" onclick="setTab(\''+t[0]+'\')">'+t[1]+'</button>';
  });
  html+='</div><div class="body">';
  if(state.tab==="write")html+=renderWrite();
  else if(state.tab==="cal")html+=renderCal();
  else html+=renderStats();
  html+='</div>';
  document.getElementById("app").innerHTML=html;
  // autosize textareas
  document.querySelectorAll("textarea").forEach(function(t){t.style.height="auto";t.style.height=Math.max(64,t.scrollHeight)+"px";});
}

function renderWrite(){
  var d=state.selDate, isToday=fmt(d)===fmt(new Date());
  var h='<div class="fade">';
  h+='<div class="dline"><div><div class="d">'+(d.getMonth()+1)+'月'+d.getDate()+'日 · 星期'+WK[d.getDay()]+'</div>'+(isToday?'<div class="today">今天</div>':'')+'</div>';
  if(!isToday)h+='<button class="backbtn" onclick="backToday()">回到今天</button>';
  h+='</div>';

  CATS.forEach(function(cat){
    var expanded=state.expandedCat===cat.id, filled=catFilled(cat.id);
    h+='<div class="cat" style="border-left-color:'+cat.color+'">';
    // bar
    h+='<div class="catbar" onclick="toggleCat(\''+cat.id+'\')">';
    h+='<div class="left"><span class="ico" style="color:'+cat.color+'">'+cat.icon+'</span><span class="lbl" style="color:'+cat.color+'">'+cat.label+'</span>';
    if(filled)h+='<span class="dot" style="background:'+cat.color+'"></span>';
    h+='</div><div class="right">';
    if(expanded)h+='<button class="exbtn" style="border-color:'+cat.color+'55;color:'+cat.color+'" onclick="toggleEx(\''+cat.id+'\',event)">'+(state.showEx[cat.id]?"收起范例":"查看范例")+'</button>';
    h+='<span class="chev'+(expanded?" open":"")+'">›</span></div></div>';

    if(expanded){
      h+='<div class="fade">';
      if(state.showEx[cat.id])h+=renderExample(cat);
      if(cat.weekdaySplit){
        var sp=splitFor(d), bg=sp.type==="rest"?"rgba(120,100,80,.06)":cat.color+"14", fg=sp.type==="rest"?"#9a9088":cat.color;
        h+='<div class="splithint" style="background:'+bg+'"><span class="t" style="color:'+fg+'">今日计划</span><span class="v" style="color:'+fg+'">'+sp.text+'</span></div>';
      }
      if(cat.topicLibrary)h+=renderPicker(cat);
      cat.fields.forEach(function(f){
        var val=esc((draft[cat.id]||{})[f.key]||"");
        h+='<div class="fld">';
        if(f.label)h+='<label>'+f.label+'</label>';
        if(f.multi)h+='<textarea data-fld="'+cat.id+'.'+f.key+'" placeholder="'+esc(f.ph)+'" oninput="onField(\''+cat.id+'\',\''+f.key+'\',this)" onfocus="this.style.borderColor=\''+cat.color+'\'" onblur="this.style.borderColor=\'rgba(120,100,80,.10)\'">'+val+'</textarea>';
        else h+='<input data-fld="'+cat.id+'.'+f.key+'" value="'+val+'" placeholder="'+esc(f.ph)+'" oninput="onField(\''+cat.id+'\',\''+f.key+'\',this)" onfocus="this.style.borderColor=\''+cat.color+'\'" onblur="this.style.borderColor=\'rgba(120,100,80,.10)\'">';
        h+='</div>';
      });
      if(cat.rule&&!state.showEx[cat.id])h+='<div class="rulehint">'+esc(cat.rule)+'</div>';
      h+='</div>';
    } else if(filled){
      var prev="";
      for(var i=0;i<cat.fields.length;i++){var v=(draft[cat.id]||{})[cat.fields[i].key];if(v&&v.trim()){prev=v.trim();break;}}
      h+='<div class="preview">'+esc(prev)+'</div>';
    }
    h+='</div>';
  });

  var hc=hasAnyContent();
  h+='<div class="actions"><button class="savebtn" style="background:'+(hc?"#3a3228":"#d0c8be")+'" onclick="save()">保 存</button>';
  if(entries[fmt(d)])h+='<button class="delbtn" onclick="del()">删除</button>';
  h+='</div></div>';
  return h;
}

function renderExample(cat){
  var h='<div class="excard" style="border-color:'+cat.color+'40">';
  h+='<div class="h"><span class="t" style="color:'+cat.color+'">范例</span><button class="x" onclick="toggleEx(\''+cat.id+'\',event)">×</button></div>';
  cat.fields.forEach(function(f){
    var v=cat.example[f.key];if(!v)return;
    if(f.label)h+='<div class="k">'+f.label+'</div>';
    h+='<div class="v">'+esc(v)+'</div>';
  });
  if(cat.rule)h+='<div class="rule">'+esc(cat.rule)+'</div>';
  h+='</div>';
  return h;
}

function renderPicker(cat){
  var h='<div class="picker"><div class="row">';
  h+='<button class="pbtn" style="flex:1;border-color:'+cat.color+'66;color:'+cat.color+';background:'+(pickerOpen?cat.color+"12":"transparent")+'" onclick="togglePicker()">'+(pickerOpen?"收起题库":"选题")+'</button>';
  h+='<button class="pbtn" style="padding:8px 16px;border-color:'+cat.color+'66;color:'+cat.color+'" onclick="randomTopic()">随机</button></div>';
  if(pickerOpen){
    h+='<div class="panel fade"><div class="ctabs">';
    cat.topicLibrary.forEach(function(g,i){
      h+='<button class="ctab" style="background:'+(pickerCat===i?cat.color:"rgba(120,100,80,.08)")+';color:'+(pickerCat===i?"#fff":"#8a8078")+'" onclick="setPickerCat('+i+')">'+g.cat+'</button>';
    });
    h+='</div><div>';
    cat.topicLibrary[pickerCat].topics.forEach(function(t){
      h+='<div class="topic" onclick="pickTopic(\''+t.replace(/'/g,"\\'")+'\')" onmouseover="this.style.background=\''+cat.color+'14\'" onmouseout="this.style.background=\'transparent\'">'+esc(t)+'</div>';
    });
    h+='</div></div>';
  }
  h+='</div>';
  return h;
}

function renderCal(){
  var dim=new Date(state.calY,state.calM+1,0).getDate();
  var fd=new Date(state.calY,state.calM,1).getDay();
  var today=fmt(new Date()), sel=fmt(state.selDate);
  var h='<div class="fade"><div class="cal">';
  h+='<div class="nav"><button onclick="calNav(-1)">‹</button><span class="m">'+state.calY+'年 '+MO[state.calM]+'</span><button onclick="calNav(1)">›</button></div>';
  h+='<div class="wk">'+WK.map(function(w){return '<div>'+w+'</div>';}).join("")+'</div>';
  h+='<div class="days">';
  for(var i=0;i<fd;i++)h+='<div></div>';
  for(var dd=1;dd<=dim;dd++){
    var ds=state.calY+"-"+String(state.calM+1).padStart(2,"0")+"-"+String(dd).padStart(2,"0");
    var cls="day"+(ds===today?" today":"")+(ds===sel?" sel":"");
    var dot=entries[ds]?'<span class="d"></span>':"";
    h+='<div class="'+cls+'" onclick="selectDate(\''+ds+'\')">'+dd+dot+'</div>';
  }
  h+='</div></div>';
  h+='<div class="sectitle">近期记录</div>';
  var keys=Object.keys(entries).sort().reverse().slice(0,10);
  if(keys.length===0)h+='<div class="empty">还没有记录</div>';
  else keys.forEach(function(k){
    var d=prs(k), fc=entryFilledCats(entries[k]);
    h+='<div class="reccard" onclick="selectDate(\''+k+'\')"><div class="rd">'+(d.getMonth()+1)+'月'+d.getDate()+'日 · 星期'+WK[d.getDay()]+'</div><div class="tags">';
    fc.forEach(function(c){h+='<span style="color:'+c.color+'">'+c.icon+' '+c.label+'</span>';});
    h+='</div></div>';
  });
  h+='</div>';
  return h;
}

function renderStats(){
  var totalDays=Object.keys(entries).length;
  var mk=new Date().getFullYear()+"-"+String(new Date().getMonth()+1).padStart(2,"0");
  var monthDays=Object.keys(entries).filter(function(k){return k.indexOf(mk)===0;}).length;
  var streak=0, sd=new Date();
  while(true){var k=fmt(sd);if(entries[k]&&entryFilledCats(entries[k]).length>0){streak++;sd.setDate(sd.getDate()-1);}else break;}
  var totalItems=0;Object.keys(entries).forEach(function(k){totalItems+=entryFilledCats(entries[k]).length;});
  var catCount={};CATS.forEach(function(c){catCount[c.id]=0;});
  Object.keys(entries).forEach(function(k){entryFilledCats(entries[k]).forEach(function(c){catCount[c.id]++;});});
  var maxC=Math.max(1,Math.max.apply(null,CATS.map(function(c){return catCount[c.id];})));

  var h='<div class="fade"><div class="stats">';
  [["累计天数",totalDays],["本月记录",monthDays],["连续天数",streak],["总条目",totalItems]].forEach(function(s){
    h+='<div class="scard"><div class="n">'+s[1]+'</div><div class="l">'+s[0]+'</div></div>';
  });
  h+='</div><div class="sectitle">分类统计</div>';
  CATS.forEach(function(c){
    var n=catCount[c.id], w=Math.round(n/maxC*100);
    h+='<div class="barrow"><div class="bh"><span class="bl" style="color:'+c.color+'">'+c.icon+' '+c.label+'</span><span class="bv">'+n+' 天</span></div>';
    h+='<div class="bartrack"><div class="barfill" style="width:'+w+'%;background:'+c.color+';min-width:'+(n>0?4:0)+'px"></div></div></div>';
  });
  h+='<div class="sectitle">本月热力</div><div class="heat">';
  var dim=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate();
  for(var dd=1;dd<=dim;dd++){
    var k=mk+"-"+String(dd).padStart(2,"0");
    var cnt=entries[k]?entryFilledCats(entries[k]).length:0;
    var op=cnt===0?0.06:0.15+cnt*0.17;
    h+='<div class="heatd" title="'+dd+'日: '+cnt+'项" style="background:rgba(212,118,78,'+op+');color:'+(cnt>0?"#fff":"#c0b8ae")+'">'+dd+'</div>';
  }
  h+='</div></div>';
  return h;
}

render();
</script>
</body>
</html>
