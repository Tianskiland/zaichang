<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;color:#3a3228;
    background:linear-gradient(165deg,#F7F3EE 0%,#EDE8E0 50%,#E8E0D6 100%);background-attachment:fixed;min-height:100vh}
  #app{max-width:520px;margin:0 auto;padding-bottom:120px}
  textarea,input{font-family:inherit}
  textarea::placeholder,input::placeholder{color:#c0b8ae}
  textarea:focus,input:focus{outline:none}
  button{font-family:inherit;cursor:pointer}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes toastIn{from{opacity:0;transform:translateY(10px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
  .fade{animation:fadeIn .3s ease}
  .hdr{padding:34px 24px 8px}
  .hdr h1{font-family:'Noto Serif SC',serif;font-size:32px;font-weight:700;letter-spacing:8px;margin-bottom:4px}
  .hdr p{font-size:13px;color:#a09888;letter-spacing:2px;font-weight:300}
  .quote{margin:14px 24px 4px;padding:16px 18px 16px 20px;border-radius:12px;background:rgba(255,252,248,.78);
    border:1px solid rgba(120,100,80,.10);border-left:3px solid #D4764E;position:relative}
  .quote .s{font-family:'Noto Serif SC',serif;font-size:16px;line-height:1.9;color:#4a4035;letter-spacing:.5px}
  .quote .meta{display:flex;align-items:center;justify-content:space-between;margin-top:11px}
  .quote .sc{font-size:13px;color:#B07A4E;letter-spacing:1px}
  .quote .refresh{font-size:13px;color:#b0a898;letter-spacing:1px;background:none;border:none}
  .tabs{display:flex;padding:0 24px;margin:10px 0 18px;border-bottom:1px solid rgba(120,100,80,.08)}
  .tab{background:none;border:none;padding:9px 16px;font-size:15px;font-weight:400;color:#a09888;
    border-bottom:2px solid transparent;letter-spacing:2px;transition:all .2s}
  .tab.on{color:#3a3228;font-weight:600;border-bottom-color:#3a3228}
  .body{padding:0 24px}
  .dline{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .dline .d{font-family:'Noto Serif SC',serif;font-size:20px;font-weight:600;letter-spacing:2px}
  .dline .today{font-size:13px;color:#D4764E;font-weight:500;margin-top:2px;letter-spacing:1px}
  .backbtn{background:none;border:1px solid rgba(120,100,80,.15);border-radius:8px;padding:5px 12px;font-size:13px;color:#8a8078}
  .cat{margin-bottom:16px;border-left:3px solid;padding-left:14px}
  .catbar{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
  .catbar .left{display:flex;align-items:center;gap:7px;font-family:'Noto Serif SC',serif}
  .catbar .ico{font-size:16px;font-weight:600}
  .catbar .lbl{font-size:16px;font-weight:600;letter-spacing:2px}
  .catbar .tag{font-size:11px;font-weight:400;padding:1px 7px;border-radius:8px;background:rgba(120,100,80,.10);color:#9a9088;font-family:'Noto Sans SC',sans-serif}
  .catbar .tag.core{background:rgba(212,118,78,.14);color:#C0603A}
  .catbar .dot{width:6px;height:6px;border-radius:50%;opacity:.5}
  .catbar .right{display:flex;align-items:center;gap:8px}
  .exbtn{background:none;border:1px solid;border-radius:6px;padding:3px 10px;font-size:13px;letter-spacing:1px;font-family:'Noto Sans SC',sans-serif}
  .chev{font-size:16px;color:#b0a898;transition:transform .2s;display:inline-block}
  .chev.open{transform:rotate(90deg)}
  .preview{font-size:14px;color:#8a8078;margin-top:4px;line-height:1.6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sub{font-size:14px;font-weight:600;letter-spacing:1px;margin:14px 0 8px;padding-bottom:5px;border-bottom:1px solid rgba(120,100,80,.10)}
  .fld{margin-bottom:10px}
  .fld label{font-size:14px;font-weight:500;color:#8a8078;margin-bottom:4px;display:block;letter-spacing:1px}
  .fld input,.fld textarea{width:100%;padding:9px 12px;border:1px solid rgba(120,100,80,.10);border-radius:6px;font-size:15px;line-height:1.7;color:#3a3228;background:rgba(255,252,248,.5);transition:border-color .2s}
  .fld input{height:38px}
  .fld textarea{min-height:60px;resize:none;overflow:hidden}
  .modesw{display:flex;gap:8px;margin-bottom:12px}
  .modesw button{flex:1;padding:9px 0;border-radius:7px;border:1px solid;font-size:13px;font-weight:600;letter-spacing:1px}
  .picker{margin-bottom:12px}
  .picker .row{display:flex;gap:8px}
  .picker .pbtn{padding:9px 0;border-radius:7px;border:1px solid;background:transparent;font-size:13px;font-weight:600;letter-spacing:2px}
  .picker .panel{background:rgba(255,252,248,.7);border:1px solid rgba(120,100,80,.10);border-radius:10px;padding:12px;margin-top:10px}
  .picker .ctabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
  .picker .ctab{padding:5px 11px;border-radius:14px;border:none;font-size:13px;letter-spacing:.5px}
  .picker .topic{padding:9px 10px;border-radius:6px;font-size:14px;color:#5a5048;line-height:1.5}
  .splithint{border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .splithint .t{font-size:14px;font-weight:600;letter-spacing:1px}
  .splithint .v{font-size:14px;font-weight:500}
  .note-soft{font-size:13px;color:#7a8a6e;background:rgba(122,154,126,.10);border-radius:8px;padding:9px 12px;margin:8px 0 4px;line-height:1.6}
  .ptags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
  .ptag{padding:7px 13px;border-radius:16px;border:1px solid;font-size:13px;letter-spacing:.5px;transition:all .15s;background:transparent}
  .ptag.on{color:#fff}
  .rulehint{font-size:13px;color:#b0a898;margin-top:4px;margin-bottom:6px;line-height:1.6;border-top:1px dashed rgba(120,100,80,.08);padding-top:8px;white-space:pre-wrap}
  .actions{display:flex;gap:10px;margin-top:20px}
  .savebtn{flex:1;padding:14px 0;border-radius:10px;border:none;color:#F7F3EE;font-size:15px;font-weight:600;letter-spacing:3px;transition:all .2s}
  .delbtn{padding:14px 16px;border-radius:10px;border:1px solid rgba(200,80,60,.2);background:transparent;color:#c8503c;font-size:13px;letter-spacing:1px}
  .cal{background:rgba(255,252,248,.85);border-radius:14px;padding:16px 14px 12px;border:1px solid rgba(120,100,80,.08)}
  .cal .nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 4px}
  .cal .nav button{background:none;border:none;font-size:18px;color:#8a8078;padding:2px 8px}
  .cal .nav .m{font-family:'Noto Serif SC',serif;font-size:15px;font-weight:600;letter-spacing:1px}
  .cal .wk{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;text-align:center;margin-bottom:4px}
  .cal .wk div{font-size:12px;color:#9a9088;font-weight:500;padding:3px 0}
  .cal .days{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;justify-items:center}
  .cal .day{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:14px;color:#5a5048;position:relative}
  .cal .day.today{color:#D4764E;font-weight:600}
  .cal .day.sel{background:#5a5048;color:#fff;font-weight:600}
  .cal .day .d{position:absolute;bottom:1px;width:4px;height:4px;border-radius:50%;background:#D4764E}
  .cal .day.sel .d{background:#fff}
  .sectitle{font-size:14px;font-weight:500;color:#8a8078;letter-spacing:2px;margin:18px 0 10px}
  .reccard{padding:12px 14px;background:rgba(255,252,248,.7);border-radius:10px;margin-bottom:7px;border:1px solid rgba(120,100,80,.06)}
  .reccard .rd{font-size:14px;font-weight:500;margin-bottom:5px}
  .reccard .tags{display:flex;gap:8px;flex-wrap:wrap}
  .reccard .tags span{font-size:12px;font-weight:500;letter-spacing:1px}

// 字段读写：draft[catId][key]
function gv(cid,k){return (draft[cid]||{})[k]||"";}
function onField(cid,k,el){if(!draft[cid])draft[cid]={};draft[cid][k]=el.value;if(el.tagName==="TEXTAREA"){el.style.height="auto";el.style.height=Math.max(60,el.scrollHeight)+"px";}}

function catFilled(cid){
  var cat=CATS.find(function(c){return c.id===cid;});var cd=draft[cid]||{};
  var keys=cat.groups?cat.groups.reduce(function(a,g){return a.concat(g.fields.map(function(f){return f.key;}));},[]):cat.fields.map(function(f){return f.key;});
  var any=keys.some(function(k){return cd[k]&&cd[k].trim();});
  if(cid==="state"&&dtags.length)any=true;
  return any;
}
function hasAny(){return CATS.some(function(c){return catFilled(c.id);});}

function save(){
  if(!hasAny()){toast("还没有填写内容");return;}
  var k=fmt(state.selDate);
  var clean={_ts:Date.now(),_v2:true,_tags:dtags.slice()};
  CATS.forEach(function(c){if(draft[c.id])clean[c.id]=draft[c.id];});
  entries[k]=clean;persist();toast("已保存 ✓");render();
}
function del(){var k=fmt(state.selDate);if(!entries[k])return;if(!confirm("确定删除"+(state.selDate.getMonth()+1)+"月"+state.selDate.getDate()+"日的记录吗？"))return;delete entries[k];persist();draft={};dtags=[];toast("已删除");render();}

function setTab(t){state.tab=t;render();}
function tg(id){state.expanded=state.expanded===id?null:id;state.pickerOpen=false;render();}
function tgTag(p){var i=dtags.indexOf(p);if(i>=0)dtags.splice(i,1);else dtags.push(p);render();}
function sm(id,m){state.mode[id]=m;state.pickerOpen=false;render();}
function tp(){state.pickerOpen=!state.pickerOpen;render();}
function spc(i){state.pickerCat=i;render();}
function pk(t){if(!draft.train)draft.train={};draft.train.topic=t;state.pickerOpen=false;render();}
function rt(){var all=[];CATS[0].topicLibrary.forEach(function(g){all=all.concat(g.topics);});pk(all[Math.floor(Math.random()*all.length)]);}
function selDate(s){state.selDate=prs(s);state.tab="write";state.expanded="train";loadDraft();render();}
function backToday(){state.selDate=new Date();loadDraft();render();}
function calNav(dir){state.calM+=dir;if(state.calM<0){state.calM=11;state.calY--;}if(state.calM>11){state.calM=0;state.calY++;}render();}

function entryFilled(e){return CATS.filter(function(c){var cd=e[c.id]||{};var keys=c.groups?c.groups.reduce(function(a,g){return a.concat(g.fields.map(function(f){return f.key;}));},[]):c.fields.map(function(f){return f.key;});var any=keys.some(function(k){return cd[k]&&String(cd[k]).trim();});if(c.id==="state"&&(e._tags||[]).length)any=true;return any;});}

// ===== 渲染 =====
function fldHTML(cid,f){
  var v=esc(gv(cid,f.key));var h='<div class="fld">';
  if(f.label)h+='<label>'+f.label+'</label>';
  if(f.multi)h+='<textarea placeholder="'+esc(f.ph)+'" oninput="onField(\''+cid+'\',\''+f.key+'\',this)" onfocus="this.style.borderColor=\'#999\'" onblur="this.style.borderColor=\'rgba(120,100,80,.10)\'">'+v+'</textarea>';
  else h+='<input value="'+v+'" placeholder="'+esc(f.ph)+'" oninput="onField(\''+cid+'\',\''+f.key+'\',this)" onfocus="this.style.borderColor=\'#999\'" onblur="this.style.borderColor=\'rgba(120,100,80,.10)\'">';
  return h+'</div>';
}
function render(){
  var d=state.selDate;
  var h='<div class="hdr"><h1>在 场</h1><p>每天，真的在一次</p></div>';
  h+='<div class="quote"><div class="s">'+esc(curQuote.s)+'</div><div class="meta"><span class="sc">— 给「'+curQuote.sc+'」的你</span><button class="refresh" onclick="nextQuote()">换一句 ↻</button></div></div>';
  h+='<div class="tabs">';
  [["write","记录"],["cal","日历"],["stats","数据"]].forEach(function(t){h+='<button class="tab'+(state.tab===t[0]?" on":"")+'" onclick="setTab(\''+t[0]+'\')">'+t[1]+'</button>';});
  h+='</div><div class="body">';
  if(state.tab==="write")h+=renderWrite();
  else if(state.tab==="cal")h+=renderCal();
  else h+=renderStats();
  h+='</div>';
  document.getElementById("app").innerHTML=h;
  document.querySelectorAll("textarea").forEach(function(t){t.style.height="auto";t.style.height=Math.max(60,t.scrollHeight)+"px";});
}
function renderWrite(){
  var d=state.selDate,isToday=fmt(d)===fmt(new Date());
  var h='<div class="fade"><div class="dline"><div><div class="d">'+(d.getMonth()+1)+'月'+d.getDate()+'日 · 星期'+WK[d.getDay()]+'</div>'+(isToday?'<div class="today">今天</div>':'')+'</div>';
  if(!isToday)h+='<button class="backbtn" onclick="backToday()">回到今天</button>';
  h+='</div>';
  CATS.forEach(function(cat){
    var ex=state.expanded===cat.id,filled=catFilled(cat.id);
    h+='<div class="cat" style="border-left-color:'+cat.color+'"><div class="catbar" onclick="tg(\''+cat.id+'\')"><div class="left"><span class="ico" style="color:'+cat.color+'">'+cat.icon+'</span><span class="lbl" style="color:'+cat.color+'">'+cat.label+'</span><span class="tag'+(cat.core?" core":"")+'">'+cat.tag+'</span>'+(filled?'<span class="dot" style="background:'+cat.color+'"></span>':'')+'</div><div class="right"><span class="chev'+(ex?" open":"")+'">›</span></div></div>';
    if(ex){
      h+='<div class="fade">';
      if(cat.weekdaySplit){var sp=splitFor(d),bg=sp.type==="rest"?"rgba(120,100,80,.06)":cat.color+"14",fg=sp.type==="rest"?"#9a9088":cat.color;h+='<div class="splithint" style="background:'+bg+'"><span class="t" style="color:'+fg+'">今日计划</span><span class="v" style="color:'+fg+'">'+sp.text+'</span></div>';}
      if(cat.groups){
        cat.groups.forEach(function(g){
          h+='<div class="sub" style="color:'+cat.color+'">'+g.sub+'</div>';
          if(g.sub==="口播"&&cat.modes){
            var m=state.mode[cat.id]||"lib";
            h+='<div class="modesw"><button style="border-color:'+cat.color+'66;background:'+(m==="lib"?cat.color:"transparent")+';color:'+(m==="lib"?"#fff":cat.color)+'" onclick="event.stopPropagation();sm(\''+cat.id+'\',\'lib\')">题库选题</button><button style="border-color:'+cat.color+'66;background:'+(m==="free"?cat.color:"transparent")+';color:'+(m==="free"?"#fff":cat.color)+'" onclick="event.stopPropagation();sm(\''+cat.id+'\',\'free\')">自由安排</button></div>';
            if(m==="lib")h+=pickerHTML(cat);
          }
          g.fields.forEach(function(f){
            if(g.sub==="口播"&&f.key==="topic"&&(state.mode[cat.id]||"lib")==="free")h+=fldHTML(cat.id,{key:"topic",label:"题目（自由输入）",ph:"自己定一个题目"});
            else h+=fldHTML(cat.id,f);
          });
        });
      } else {
        if(cat.soft)h+='<div class="note-soft">🌱 '+cat.soft+'</div>';
        if(cat.patterns){
          h+='<div style="font-size:14px;font-weight:500;color:#8a8078;margin:8px 0 6px;letter-spacing:1px">今天的情绪模式（可多选）</div><div class="ptags">';
          cat.patterns.forEach(function(p){var on=dtags.indexOf(p)>=0;h+='<button class="ptag'+(on?" on":"")+'" style="border-color:'+cat.color+'66;'+(on?"background:"+cat.color+";":"color:"+cat.color)+'" onclick="event.stopPropagation();tgTag(\''+p+'\')">'+p+'</button>';});
          h+='</div>';
        }
        cat.fields.forEach(function(f){h+=fldHTML(cat.id,f);});
      }
      h+='</div>';
    } else if(filled){
      var prev="";
      if(cat.id==="state"&&dtags.length)prev=dtags.join("、");
      if(!prev){var keys=cat.groups?cat.groups.reduce(function(a,g){return a.concat(g.fields.map(function(f){return f.key;}));},[]):cat.fields.map(function(f){return f.key;});for(var i=0;i<keys.length;i++){var v=gv(cat.id,keys[i]);if(v&&v.trim()){prev=v.trim();break;}}}
      h+='<div class="preview">'+esc(prev)+'</div>';
    }
    h+='</div>';
  });
  var hc=hasAny();
  h+='<div class="actions"><button class="savebtn" style="background:'+(hc?"#3a3228":"#d0c8be")+'" onclick="save()">保 存</button>';
  if(entries[fmt(d)])h+='<button class="delbtn" onclick="del()">删除</button>';
  h+='</div></div>';
  return h;
}
function pickerHTML(cat){
  var h='<div class="picker"><div class="row"><button class="pbtn" style="flex:1;border-color:'+cat.color+'66;color:'+cat.color+';background:'+(state.pickerOpen?cat.color+"12":"transparent")+'" onclick="event.stopPropagation();tp()">'+(state.pickerOpen?"收起题库":"展开题库")+'</button><button class="pbtn" style="padding:9px 16px;border-color:'+cat.color+'66;color:'+cat.color+'" onclick="event.stopPropagation();rt()">随机</button></div>';
  if(state.pickerOpen){h+='<div class="panel"><div class="ctabs">';cat.topicLibrary.forEach(function(g,i){h+='<button class="ctab" style="background:'+(state.pickerCat===i?cat.color:"rgba(120,100,80,.08)")+';color:'+(state.pickerCat===i?"#fff":"#8a8078")+'" onclick="event.stopPropagation();spc('+i+')">'+g.cat+'</button>';});h+='</div><div>';cat.topicLibrary[state.pickerCat].topics.forEach(function(t){h+='<div class="topic" onclick="event.stopPropagation();pk(\''+t.replace(/'/g,"\\'")+'\')" onmouseover="this.style.background=\''+cat.color+'14\'" onmouseout="this.style.background=\'transparent\'">'+esc(t)+'</div>';});h+='</div></div>';}
  return h+'</div>';
}
function renderCal(){
  var dim=new Date(state.calY,state.calM+1,0).getDate(),fd=new Date(state.calY,state.calM,1).getDay();
  var today=fmt(new Date()),sel=fmt(state.selDate);
  var h='<div class="fade"><div class="cal"><div class="nav"><button onclick="calNav(-1)">‹</button><span class="m">'+state.calY+'年 '+MO[state.calM]+'</span><button onclick="calNav(1)">›</button></div>';
  h+='<div class="wk">'+WK.map(function(w){return '<div>'+w+'</div>';}).join("")+'</div><div class="days">';
  for(var i=0;i<fd;i++)h+='<div></div>';
  for(var dd=1;dd<=dim;dd++){var ds=state.calY+"-"+String(state.calM+1).padStart(2,"0")+"-"+String(dd).padStart(2,"0");var cls="day"+(ds===today?" today":"")+(ds===sel?" sel":"");h+='<div class="'+cls+'" onclick="selDate(\''+ds+'\')">'+dd+(entries[ds]?'<span class="d"></span>':"")+'</div>';}
  h+='</div></div><div class="sectitle">近期记录</div>';
  var keys=Object.keys(entries).sort().reverse().slice(0,10);
  if(!keys.length)h+='<div class="empty">还没有记录</div>';
  else keys.forEach(function(k){var dt=prs(k),fc=entryFilled(entries[k]);h+='<div class="reccard" onclick="selDate(\''+k+'\')"><div class="rd">'+(dt.getMonth()+1)+'月'+dt.getDate()+'日 · 星期'+WK[dt.getDay()]+'</div><div class="tags">';fc.forEach(function(c){h+='<span style="color:'+c.color+'">'+c.icon+' '+c.label+'</span>';});h+='</div></div>';});
  return h+'</div>';
}
function renderStats(){
  var totalDays=Object.keys(entries).length;
  var mk=new Date().getFullYear()+"-"+String(new Date().getMonth()+1).padStart(2,"0");
  var monthDays=Object.keys(entries).filter(function(k){return k.indexOf(mk)===0;}).length;
  var streak=0,sd=new Date();while(true){var k=fmt(sd);if(entries[k]&&entryFilled(entries[k]).length>0){streak++;sd.setDate(sd.getDate()-1);}else break;}
  var totalItems=0;Object.keys(entries).forEach(function(k){totalItems+=entryFilled(entries[k]).length;});
  var cc={};CATS.forEach(function(c){cc[c.id]=0;});Object.keys(entries).forEach(function(k){entryFilled(entries[k]).forEach(function(c){cc[c.id]++;});});
  var maxC=Math.max(1,Math.max.apply(null,CATS.map(function(c){return cc[c.id];})));
  var h='<div class="fade"><div class="stats">';
  [["累计天数",totalDays],["本月记录",monthDays],["连续天数",streak],["总条目",totalItems]].forEach(function(s){h+='<div class="scard"><div class="n">'+s[1]+'</div><div class="l">'+s[0]+'</div></div>';});
  h+='</div><div class="sectitle">分类统计</div>';
  CATS.forEach(function(c){var n=cc[c.id],w=Math.round(n/maxC*100);h+='<div class="barrow"><div class="bh"><span class="bl" style="color:'+c.color+'">'+c.icon+' '+c.label+'</span><span class="bv">'+n+' 天</span></div><div class="bartrack"><div class="barfill" style="width:'+w+'%;background:'+c.color+';min-width:'+(n>0?4:0)+'px"></div></div></div>';});
  h+='<div class="sectitle">本月热力</div><div class="heat">';
  var dim=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate();
  for(var dd=1;dd<=dim;dd++){var k=mk+"-"+String(dd).padStart(2,"0");var cnt=entries[k]?entryFilled(entries[k]).length:0;var op=cnt===0?0.06:0.15+cnt*0.21;h+='<div class="heatd" title="'+dd+'日:'+cnt+'项" style="background:rgba(212,118,78,'+op+');color:'+(cnt>0?"#fff":"#c0b8ae")+'">'+dd+'</div>';}
  return h+'</div></div>';
}
render();
</script>
</body>
</html>
